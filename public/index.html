<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entry Pass Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="assets/My_Home_Constructions_logo.webp">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="overlay">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/My_Home_Constructions_logo.webp" alt="Logo" class="login-logo" />
                <h2>Entry Pass Login</h2>
                <p>Enter operator details to continue</p>
            </div>
            <form id="loginForm">
                <div class="field-group">
                    <label>Operator Name</label>
                    <input type="text" id="operatorName" placeholder="Name" required />
                </div>
                <div class="field-group">
                    <label>Site Selection</label>
                    <select id="siteSelect" required>
                        <option value="">Select Site</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <p style="text-align:center; margin-top:1.5rem; font-size:0.8rem;">
                    <a href="admin.html" style="color: var(--accent); font-weight:700; text-decoration:none;">Login as
                        Admin</a>
                </p>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" style="display:none;">
        <header class="app-header">
            <div class="header-inner">
                <img src="assets/My_Home_Constructions_logo.webp" alt="Logo" class="header-logo" />
                <div class="header-text">
                    <h1>Entry Pass</h1>
                    <p id="operatorInfo"></p>
                </div>
                <button id="btnLogout" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </header>

        <main class="app-main">
            <!-- Left: Form Carousel -->
            <section class="panel panel-left">
                <div class="stepper">
                    <div class="step-item active" id="stepIndicator1">1 <span>Personal</span></div>
                    <div class="step-item" id="stepIndicator2">2 <span>Employee</span></div>
                    <div class="step-item" id="stepIndicator3">3 <span>Photo</span></div>
                </div>

                <div class="carousel-container">
                    <div class="carousel-track" id="carouselTrack">
                        <!-- Step 1: Personal -->
                        <div class="carousel-step" id="step1">
                            <div class="card-section">
                                <h2 class="section-title">Personal Details</h2>
                                <form id="passForm" autocomplete="off">
                                    <div class="field-group">
                                        <label>Full Name</label>
                                        <input type="text" id="fullName" maxlength="40" placeholder="John Doe"
                                            required />
                                    </div>
                                    <div class="form-row two-col">
                                        <div class="field-group">
                                            <label>Aadhar Number</label>
                                            <input type="text" id="aadhar" maxlength="12" placeholder="123456789012"
                                                required />
                                        </div>
                                        <div class="field-group">
                                            <label>Gender</label>
                                            <select id="gender" required>
                                                <option value="">Select</option>
                                                <option>Male</option>
                                                <option>Female</option>
                                                <option>Other</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="form-row two-col">
                                        <div class="field-group">
                                            <label>Date of Birth</label>
                                            <input type="date" id="dob" required />
                                        </div>
                                        <div class="field-group">
                                            <label>Age</label>
                                            <input type="text" id="age" readonly />
                                        </div>
                                    </div>
                                    <div class="field-group">
                                        <label>Blood Group</label>
                                        <select id="bloodGroup" required>
                                            <option value="">Select</option>
                                            <option>A+</option>
                                            <option>A-</option>
                                            <option>B+</option>
                                            <option>B-</option>
                                            <option>AB+</option>
                                            <option>AB-</option>
                                            <option>O+</option>
                                            <option>O-</option>
                                        </select>
                                    </div>
                                </form>
                                <div class="step-actions">
                                    <button type="button" id="btnToStep2" class="btn btn-primary btn-block">Next:
                                        Employment &rarr;</button>
                                </div>
                            </div>
                        </div>

                        <!-- Step 2: Employment -->
                        <div class="carousel-step" id="step2">
                            <div class="card-section">
                                <h2 class="section-title">Employment Details</h2>
                                <div class="form-row two-col">
                                    <div class="field-group">
                                        <label>Contractor</label>
                                        <select id="contractor" required>
                                            <option value="">Select Contractor</option>
                                        </select>
                                    </div>
                                    <div class="field-group">
                                        <label>Labor Camp</label>
                                        <select id="laborCamp" required>
                                            <option value="">Select</option>
                                            <option>LC</option>
                                            <option>N/A</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-row two-col">
                                    <div class="field-group">
                                        <label>Designation</label>
                                        <select id="designation" required>
                                            <option value="">Select</option>
                                        </select>
                                    </div>
                                    <div class="field-group">
                                        <label>Contact Number</label>
                                        <input type="tel" id="contact" maxlength="10" placeholder="Number" required />
                                    </div>
                                </div>
                                <div class="form-row two-col">
                                    <div class="field-group">
                                        <label>Date of Induction</label>
                                        <input type="date" id="doi" required />
                                    </div>
                                    <div class="field-group">
                                        <label>Validity</label>
                                        <input type="date" id="validity" required />
                                    </div>
                                </div>
                                <div class="field-group">
                                    <label>Issue Date</label>
                                    <input type="text" id="issueDate" readonly />
                                </div>
                                <div class="step-actions">
                                    <button type="button" id="btnBackTo1" class="btn btn-secondary">Back</button>
                                    <button type="button" id="btnToStep3" class="btn btn-primary">Next: Photo
                                        &rarr;</button>
                                </div>
                            </div>
                        </div>

                        <!-- Step 3: Photo -->
                        <div class="carousel-step" id="step3">
                            <div class="card-section">
                                <h2 class="section-title">Photo Capture</h2>
                                <div class="webcam-module">
                                    <div class="webcam-canvas-area">
                                        <video id="videoFeed" autoplay muted playsinline></video>
                                        <div class="photo-overlay" id="photoPlaceholder">Camera Inactive</div>
                                        <canvas id="croppedPhoto" style="display:none;"></canvas>
                                    </div>
                                    <div class="camera-error" id="cameraError"></div>
                                    <div class="camera-toolbar">
                                        <button type="button" id="btnStartCamera"
                                            class="btn btn-secondary btn-sm">Start</button>
                                        <button type="button" id="btnCapture" class="btn btn-primary btn-sm"
                                            disabled>Capture</button>
                                        <button type="button" id="btnRetake" class="btn btn-secondary btn-sm"
                                            style="display:none;">Retake</button>
                                    </div>
                                </div>
                                <div class="step-actions">
                                    <button type="button" id="btnBackTo2" class="btn btn-secondary">Back</button>
                                    <button type="button" id="btnGenerate" class="btn btn-generate">Generate
                                        Pass</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right: Preview & Batch -->
            <section class="panel panel-right">
                <div class="preview-card">
                    <div class="preview-header">
                        <h2 class="section-title">Pass Preview</h2>
                        <div class="action-stack" id="previewActions" style="display:none;">
                            <button type="button" id="btnDownload" class="btn btn-secondary btn-sm">Download</button>
                            <button type="button" id="btnPrint" class="btn btn-secondary btn-sm">Print</button>
                            <button type="button" id="btnAddToBatch" class="btn btn-success btn-sm">Save & Add to
                                Batch</button>
                            <button type="button" id="btnNextEntry" class="btn btn-primary btn-sm"
                                style="display:none;">Next Entry</button>
                        </div>
                    </div>
                    <div class="canvas-stage">
                        <!-- <div class="stage-placeholder" id="canvasEmpty">Preview will appear here</div> -->
                        <canvas id="idCard" width="638" height="1011"></canvas>
                    </div>
                </div>

                <div class="batch-card card-section">
                    <h2 class="section-title">Batch Queue</h2>
                    <div id="batchList" class="batch-shelf"></div>
                    <div class="batch-footer">
                        <button id="btnClearBatch" class="btn btn-ghost btn-xs">Clear</button>
                        <button id="btnPrintBatch" class="btn btn-primary btn-sm" disabled>Print Batch (A4)</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <canvas id="snapCanvas" style="display:none;"></canvas>
    <div id="printArea" aria-hidden="true"><img id="printImg" src="" /></div>
    <div id="batchPrintArea" class="a4-page"></div>

    <!-- CUSTOM ALERT MODAL -->
    <div id="customAlert" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Message</h3>
            </div>
            <div class="modal-body">
                <p id="alertMessage"></p>
            </div>
            <div class="modal-footer">
                <button type="button" id="closeAlert" class="btn btn-primary btn-sm">OK</button>
            </div>
        </div>
    </div>

    <!-- NON-BLOCKING TOAST NOTIFICATIONS -->
    <div id="toastContainer"></div>

    <script src="script.js"></script>
</body>

</html>
