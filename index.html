<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Home Group – Secure ID Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="app-header">
        <div class="header-inner">
            <img src="assets/My_Home_Constructions_logo.webp" alt="Logo" class="header-logo" />
            <div class="header-text">
                <h1>Secure ID Card Generator</h1>
                <p>My Home Group &mdash; Official HR Tool</p>
            </div>
        </div>
    </header>

    <main class="app-main">
        <section class="panel panel-left">
            <div class="stepper">
                <div class="step-item active" id="stepIndicator1">1 <span>Details</span></div>
                <div class="step-item" id="stepIndicator2">2 <span>Photo</span></div>
            </div>

            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-step active" id="step1">
                        <div class="card-section">
                            <h2 class="section-title">📋 Employee Details</h2>
                            <form id="empForm" autocomplete="off">
                                <div class="field-group">
                                    <label>Full Name *</label>
                                    <input type="text" id="fullName" maxlength="40"
                                        placeholder="e.g. Arun Kumar Sharma" />
                                    <div class="field-error" id="err-fullName"></div>
                                </div>
                                <div class="form-row two-col">
                                    <div class="field-group">
                                        <label>Employee ID</label>
                                        <input type="text" id="empId" readonly />
                                    </div>
                                    <div class="field-group">
                                        <label>Blood Group</label>
                                        <select id="bloodGroup">
                                            <option value="">Select</option>
                                            <option>A+</option>
                                            <option>A-</option>
                                            <option>B+</option>
                                            <option>B-</option>
                                            <option>O+</option>
                                            <option>O-</option>
                                            <option>AB+</option>
                                            <option>AB-</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="field-group">
                                    <label>Designation *</label>
                                    <select id="designation">
                                        <option value="">Select Category</option>
                                        <option>Worker</option>
                                        <option>Employee</option>
                                    </select>
                                    <div class="field-error" id="err-designation"></div>
                                </div>
                                <div class="form-row two-col">
                                    <div class="field-group">
                                        <label>Contact Number</label>
                                        <input type="tel" id="contact" maxlength="10" placeholder="9876543210" />
                                    </div>
                                    <div class="field-group">
                                        <label>Valid Until</label>
                                        <input type="date" id="validity" />
                                    </div>
                                </div>
                            </form>
                            <div class="step-actions">
                                <div style="flex:1"></div>
                                <button type="button" id="btnNext" class="btn btn-primary">Next: Take Photo
                                    &rarr;</button>
                            </div>
                        </div>
                    </div>

                    <div class="carousel-step" id="step2">
                        <div class="card-section">
                            <h2 class="section-title">Employee Photo</h2>
                            <div class="webcam-container">
                                <div class="webcam-view">
                                    <video id="videoFeed" autoplay muted playsinline></video>
                                    <canvas id="snapCanvas" style="display:none;"></canvas>
                                    <div class="photo-placeholder" id="photoPlaceholder">👤<p>Camera not started</p>
                                    </div>
                                    <canvas id="croppedPhoto" style="display:none;"></canvas>
                                </div>
                                <div class="camera-error" id="cameraError" style="display:none;"></div>
                                <div class="webcam-controls">
                                    <button type="button" id="btnStartCamera" class="btn btn-secondary">Start
                                        Camera</button>
                                    <button type="button" id="btnCapture" class="btn btn-primary"
                                        disabled>Capture</button>
                                    <button type="button" id="btnRetake" class="btn btn-secondary"
                                        style="display:none;">Retake</button>
                                </div>
                            </div>
                            <div class="step-actions">
                                <button type="button" id="btnBack" class="btn btn-secondary">&larr; Back</button>
                                <button type="button" id="btnGenerate" class="btn btn-generate">Generate ID
                                    Card</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel panel-right">
            <div class="preview-header">
                <h2 class="section-title">ID Card Preview</h2>
                <div class="preview-actions" id="previewActions" style="display:none;">
                    <button type="button" id="btnDownload" class="btn btn-secondary">Download</button>
                    <button type="button" id="btnPrint" class="btn btn-secondary">Print</button>
                    <button type="button" id="btnFinish" class="btn btn-success">Finish</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <div class="canvas-empty-state" id="canvasEmpty">
                    <p>Fill details & capture photo<br />then click <strong>Generate ID Card</strong>.</p>
                </div>
                <canvas id="idCard"></canvas>
            </div>
            <div class="render-error" id="renderError" style="display:none;"></div>
        </section>
    </main>

    <div id="printArea" aria-hidden="true"><img id="printImg" src="" /></div>
    <script src="script.js"></script>
</body>

</html>
